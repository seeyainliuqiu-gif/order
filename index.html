<!DOCTYPE html>

<html lang="zh-TW">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>See Ya Bar 點餐系統</title>

    <style>

        body {

            background: linear-gradient(135deg, #1f1135 0%, #0f081d 100%);

            color: #fff;

            font-family: 'Helvetica Neue', Arial, sans-serif;

            margin: 0;

            padding: 20px;

            display: flex;

            flex-direction: column;

            align-items: center;

        }

        .header {

            text-align: center;

            margin-bottom: 30px;

        }

        .header h1 {

            font-size: 3em;

            margin: 0;

            color: #ff007f;

            text-shadow: 0 0 10px #ff007f, 0 0 20px #ff007f;

        }

        .header p {

            color: #00ffff;

            text-shadow: 0 0 5px #00ffff;

            font-style: italic;

        }

        .container {

            width: 100%;

            max-width: 500px;

            background: rgba(255, 255, 255, 0.05);

            padding: 20px;

            border-radius: 15px;

            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);

            backdrop-filter: blur(4px);

            border: 1px solid rgba(255, 255, 255, 0.1);

            box-sizing: border-box;

        }

        .input-group {

            margin-bottom: 20px;

        }

        label {

            display: block;

            margin-bottom: 8px;

            color: #ffaa00;

            font-weight: bold;

        }

        input[type="text"] {

            width: 100%;

            padding: 12px;

            background: rgba(0,0,0,0.5);

            border: 1px solid #ff007f;

            border-radius: 8px;

            color: white;

            font-size: 16px;

            box-sizing: border-box;

        }

        .menu-item {

            display: flex;

            justify-content: space-between;

            align-items: center;

            padding: 15px 0;

            border-bottom: 1px solid rgba(255,255,255,0.1);

        }

        .menu-item:last-child { border: none; }

        .btn-count {

            background: #00ffff;

            border: none;

            color: #000;

            padding: 5px 12px;

            font-size: 18px;

            font-weight: bold;

            border-radius: 5px;

            cursor: pointer;

        }

        .qty { margin: 0 10px; font-size: 18px; }

        .footer-btn {

            width: 100%;

            background: linear-gradient(90deg, #ff007f, #ffaa00);

            border: none;

            color: white;

            padding: 15px;

            font-size: 18px;

            font-weight: bold;

            border-radius: 8px;

            margin-top: 20px;

            cursor: pointer;

            box-shadow: 0 0 15px rgba(255, 0, 127, 0.5);

        }

    </style>

</head>

<body>



    <div class="header">

        <h1>See Ya</h1>

        <p>小琉球‧深夜微醺</p>

    </div>



    <div class="container">

        <div class="input-group">

            <label>📍 請輸入您的桌號 / 位置：</label>

            <input type="text" id="tableNum" placeholder="例如：桌號 5 或 吧台B">

        </div>



        <h3 style="color:#00ffff; border-bottom:1px solid #00ffff; padding-bottom:5px;">🍸 微醺酒單</h3>

        <div class="menu-item">

            <div>

                <span style="font-weight:bold;">招牌特調 See Ya Bar</span><br>

                <span style="color:#aaa; font-size:14px;">NT$ 350</span>

            </div>

            <div>

                <button class="btn-count" onclick="changeQty('item1', -1)">-</button>

                <span class="qty" id="item1">0</span>

                <button class="btn-count" onclick="changeQty('item1', 1)">+</button>

            </div>

        </div>



        <div class="menu-item">

            <div>

                <span style="font-weight:bold;">島嶼海風 (無酒精)</span><br>

                <span style="color:#aaa; font-size:14px;">NT$ 180</span>

            </div>

            <div>

                <button class="btn-count" onclick="changeQty('item2', -1)">-</button>

                <span class="qty" id="item2">0</span>

                <button class="btn-count" onclick="changeQty('item2', 1)">+</button>

            </div>

        </div>



        <button class="footer-btn" onclick="sendOrder()">確認送出 🍹</button>

    </div>



    <script>

        let prices = { item1: 350, item2: 180 };

        let names = { item1: "招牌特調 See Ya Bar", item2: "島嶼海風 (無酒精)" };

        let qty = { item1: 0, item2: 0 };



        function changeQty(id, val) {

            qty[id] = Math.max(0, qty[id] + val);

            document.getElementById(id).innerText = qty[id];

        }



        function sendOrder() {

            let table = document.getElementById('tableNum').value.trim();

            if(!table) { alert('請輸入桌號！'); return; }

            

            if(qty.item1 === 0 && qty.item2 === 0) { alert('請至少點一杯酒水喔！'); return; }



            let orderItems = [];

            let totalPrice = 0;

            for(let key in qty) {

                if(qty[key] > 0) {

                    orderItems.push(names[key] + " x" + qty[key]);

                    totalPrice += qty[key] * prices[key];

                }

            }



            // ⚠️ 這裡請替換成你的 Google Apps Script 網址

            let googleUrl = "https://script.google.com/macros/s/AKfycby0JYzialXEd8QIY_fQFVOS78SpvUBRT9JXG3aJzZ37xvbvFCfhDAk_CYSQuonybBl4/exec";



            let orderData = {

                tableNum: table,

                orderItems: orderItems.join(", "),

                totalPrice: "NT$ " + totalPrice

            };



            alert('正在幫您傳送訂單給櫃檯，請稍候...');



            fetch(googleUrl, {

                method: "POST",

                method: "POST",

                body: JSON.stringify(orderData)

            })

            .then(res => res.json())

            .then(result => {

                if(result.result === "success") {

                    alert('🎉 點餐成功！酒水隨後就到，See Ya！');

                    document.getElementById('tableNum').value = "";

                    qty.item1 = 0; qty.item2 = 0;

                    document.getElementById('item1').innerText = 0;

                    document.getElementById('item2').innerText = 0;

                } else {

                    alert('❌ 傳送失敗，請舉手向服務生點餐！');

                }

            })

            .catch(err => {

                alert('🎉 點餐成功！酒水隨後就到，See Ya！');

            });

        }

    </script>

</body>

</html>
